<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity Details - Helpinghands</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --emerald:#00C896;--emerald-dark:#00A07A;--emerald-glow:#00C89620;
    --coral:#FF6B6B;--coral-glow:#FF6B6B20;
    --amber:#FFB347;--amber-glow:#FFB34720;
    --violet:#7C3AED;--violet-glow:#7C3AED15;
    --navy:#0F1729;--navy2:#162040;--navy3:#1E2D52;
    --slate:#8B9ABF;--slate2:#C4CEDE;
    --white:#FFFFFF;--white80:rgba(255,255,255,0.8);--white10:rgba(255,255,255,0.07);--white05:rgba(255,255,255,0.04);
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --text:#E8EDF8;--text2:#A8B4CC;
    --r8:8px;--r12:12px;--r16:16px;--r20:20px;
  }
  body{font-family:'Satoshi',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
  
  .bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .bg-mesh::before{content:'';position:absolute;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(ellipse,rgba(0,200,150,0.07) 0%,transparent 70%)}
  .bg-mesh::after{content:'';position:absolute;bottom:-30%;right:-15%;width:70%;height:70%;background:radial-gradient(ellipse,rgba(124,58,237,0.06) 0%,transparent 70%)}
  .bg-dots{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:28px 28px}

  .shell{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
  
  header{padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(15,23,41,0.7);position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:10px;font-family:'Clash Display',sans-serif;font-weight:700;font-size:1.3rem;color:var(--white);text-decoration:none}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--emerald),#00E5B0);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px rgba(0,200,150,0.35)}
  .logo span{color:var(--emerald)}
  .header-actions{display:flex;align-items:center;gap:10px}
  .btn-sm{padding:7px 16px;border-radius:var(--r8);border:1px solid var(--border2);background:var(--white10);color:var(--text2);font-family:'Satoshi',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none}
  .btn-sm:hover{background:rgba(255,255,255,0.12);color:var(--white)}
  .btn-primary{background:linear-gradient(135deg,var(--emerald),#00E5B0);border-color:transparent;color:#003320;font-weight:700}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,200,150,0.4)}
  .notif{width:36px;height:36px;border-radius:var(--r8);border:1px solid var(--border2);background:var(--white10);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:16px;text-decoration:none}
  .notif-dot{position:absolute;top:7px;right:8px;width:6px;height:6px;background:var(--coral);border-radius:50%;border:1.5px solid var(--navy)}

  nav{padding:0 2rem;border-bottom:1px solid var(--border);background:rgba(15,23,41,0.5);backdrop-filter:blur(10px);display:flex;gap:0;overflow-x:auto}
  .tab{padding:16px 20px;font-size:13.5px;font-weight:500;color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:7px;position:relative;text-decoration:none}
  .tab:hover{color:var(--white80)}

  main{flex:1;padding:2rem;max-width:1100px;margin:0 auto;width:100%}

  .breadcrumb{display:flex;align-items:center;gap:.5rem;margin-bottom:1.5rem;font-size:13px;color:var(--text2)}
  .breadcrumb a{color:var(--emerald);text-decoration:none}
  .breadcrumb a:hover{text-decoration:underline}
  .breadcrumb span{color:var(--slate)}

  .opportunity-hero{background:linear-gradient(120deg,rgba(0,200,150,0.08),rgba(124,58,237,0.06));border:1px solid var(--border);border-radius:var(--r20);padding:2.5rem;margin-bottom:2rem;animation:fadeUp .5s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  
  .opp-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
  .opp-title-section{flex:1}
  .opp-category{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:600;margin-bottom:1rem}
  .opp-category.env{background:rgba(0,200,150,0.12);color:#00C896;border:1px solid rgba(0,200,150,0.25)}
  .opp-category.med{background:rgba(91,200,255,0.12);color:#5BC8FF;border:1px solid rgba(91,200,255,0.25)}
  .opp-category.edu{background:rgba(255,179,71,0.12);color:#FFB347;border:1px solid rgba(255,179,71,0.3)}
  .opp-category.animal{background:rgba(255,182,193,0.12);color:#FFB6C1;border:1px solid rgba(255,182,193,0.3)}
  .opp-category.tech{background:rgba(167,139,250,0.12);color:#A78BFA;border:1px solid rgba(167,139,250,0.3)}
  .opp-category.shelter{background:rgba(0,200,150,0.12);color:#00C896;border:1px solid rgba(0,200,150,0.25)}
  
  .opp-title{font-family:'Clash Display',sans-serif;font-size:2rem;font-weight:700;line-height:1.2;margin-bottom:.75rem}
  .opp-ngo{display:flex;align-items:center;gap:.75rem}
  .opp-ngo-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .opp-ngo-name{font-size:15px;font-weight:600}
  .opp-ngo-verified{font-size:12px;color:var(--emerald)}
  
  .signup-card{background:var(--navy3);border:1px solid var(--border);border-radius:var(--r16);padding:1.5rem;min-width:240px;text-align:center}
  .signup-spots{font-family:'Clash Display',sans-serif;font-size:2rem;font-weight:700;color:var(--emerald);margin-bottom:.3rem}
  .signup-total{font-size:13px;color:var(--text2);margin-bottom:1rem}
  .progress-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:4px;margin-bottom:1rem;overflow:hidden}
  .progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--emerald),#5BC8FF);transition:width 1s ease}
  .btn-signup-large{padding:12px 28px;border-radius:var(--r8);border:none;background:linear-gradient(135deg,var(--emerald),#00E5B0);color:#003320;font-family:'Satoshi',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;width:100%;margin-bottom:.75rem}
  .btn-signup-large:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,200,150,0.4)}
  .btn-signup-large.signed{background:linear-gradient(135deg,#444,#333);color:var(--text2);cursor:default}
  .btn-signup-large.signed:hover{transform:none;box-shadow:none}
  .xp-badge{font-size:12px;color:var(--amber);font-weight:600}
  .share-buttons{display:flex;gap:.5rem;margin-top:.75rem}
  .btn-share{padding:6px 12px;border-radius:var(--r8);border:1px solid var(--border2);background:var(--white10);color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s;flex:1}
  .btn-share:hover{background:rgba(255,255,255,0.12);color:var(--white)}

  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}
  .detail-card{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r12);padding:1.25rem;display:flex;align-items:flex-start;gap:1rem;animation:fadeUp .5s ease both}
  .detail-icon{font-size:1.5rem;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .detail-content{flex:1}
  .detail-label{font-size:11px;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
  .detail-value{font-size:15px;font-weight:600;color:var(--text)}
  .detail-sub{font-size:12px;color:var(--text2);margin-top:.2rem}

  .section-card{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r16);padding:1.5rem;margin-bottom:1.5rem;animation:fadeUp .5s ease both}
  .section-title{font-family:'Clash Display',sans-serif;font-size:1.1rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  .section-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:1rem}

  .skills-list{display:flex;flex-wrap:wrap;gap:.5rem}
  .skill-tag{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--white10);font-size:12.5px;color:var(--text2)}
  .skill-tag.highlight{background:rgba(0,200,150,0.12);border-color:rgba(0,200,150,0.3);color:var(--emerald)}

  .volunteers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem}
  .volunteer-card{background:var(--navy3);border:1px solid var(--border);border-radius:var(--r12);padding:1rem;display:flex;align-items:center;gap:.75rem;animation:fadeUp .4s ease both}
  .volunteer-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
  .volunteer-info{flex:1}
  .volunteer-name{font-size:14px;font-weight:600}
  .volunteer-role{font-size:12px;color:var(--text2)}
  .volunteer-badge{font-size:18px}

  .timeline{position:relative;padding-left:2rem}
  .timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
  .timeline-item{position:relative;margin-bottom:1.5rem;padding-left:1rem}
  .timeline-item::before{content:'';position:absolute;left:-1.65rem;top:4px;width:12px;height:12px;border-radius:50%;background:var(--emerald);border:2px solid var(--navy2)}
  .timeline-item.completed::before{background:var(--text2)}
  .timeline-time{font-size:11px;color:var(--slate);margin-bottom:.2rem}
  .timeline-text{font-size:13.5px;color:var(--text)}

  .agenda-item{display:flex;gap:1rem;padding:.75rem 0;border-bottom:1px solid var(--border)}
  .agenda-item:last-child{border-bottom:none}
  .agenda-time{font-size:12px;color:var(--emerald);font-weight:600;min-width:60px}
  .agenda-desc{font-size:13.5px;color:var(--text)}
  .agenda-sub{font-size:12px;color:var(--text2)}

  .toast{position:fixed;bottom:2rem;right:2rem;background:linear-gradient(135deg,var(--emerald),#00E5B0);color:#003320;padding:12px 22px;border-radius:var(--r12);font-weight:700;font-size:14px;z-index:9999;transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 8px 32px rgba(0,200,150,0.45);display:flex;align-items:center;gap:8px}
  .toast.show{transform:translateY(0);opacity:1}

  .detail-card:nth-child(1){animation-delay:.05s}
  .detail-card:nth-child(2){animation-delay:.1s}
  .detail-card:nth-child(3){animation-delay:.15s}
  .detail-card:nth-child(4){animation-delay:.2s}
  .volunteer-card:nth-child(1){animation-delay:.05s}
  .volunteer-card:nth-child(2){animation-delay:.1s}
  .volunteer-card:nth-child(3){animation-delay:.15s}
  .volunteer-card:nth-child(4){animation-delay:.2s}
  .volunteer-card:nth-child(5){animation-delay:.25s}
  .volunteer-card:nth-child(6){animation-delay:.3s}

  @media(max-width:768px){
    .detail-grid{grid-template-columns:1fr}
    .opp-header{flex-direction:column}
    .signup-card{width:100%}
    .opp-title{font-size:1.5rem}
    .opportunity-hero{padding:1.5rem}
    .volunteers-grid{grid-template-columns:1fr}
  }
</style>
</head>

let currentOpportunity = null;
let isSignedUp = false;

function getCategoryClass(cat) {
  const classes = {
    'env': 'env', 'med': 'med', 'edu': 'edu', 'animal': 'animal',
    'tech': 'tech', 'shelter': 'env'
  };
  return classes[cat] || 'env';
}

function getCategoryEmoji(cat) {
  const emojis = {
    'env': '🌿', 'med': '🏥', 'edu': '📚', 'animal': '🐾',
    'tech': '💻', 'shelter': '🏠'
  };
  return emojis[cat] || '🤝';
}

function renderOpportunityDetails(opp) {
  currentOpportunity = opp;
  const spotsLeft = opp.totalSpots - opp.filledSpots;
  const fillPercent = (opp.filledSpots / opp.totalSpots) * 100;
  
  document.getElementById('breadcrumb-title').textContent = opp.title;
  
  // Hero section
  document.getElementById('opportunityHero').innerHTML = `
    <div class="opp-header">
      <div class="opp-title-section">
        <div class="opp-category ${getCategoryClass(opp.category)}">${getCategoryEmoji(opp.category)} ${opp.categoryLabel}</div>
        <h1 class="opp-title">${opp.title}</h1>
        <div class="opp-ngo">
          <div class="opp-ngo-avatar" style="background:${opp.ngoBg}">${opp.ngoEmoji}</div>
          <div>
            <div class="opp-ngo-name">${opp.ngo}</div>
            <div class="opp-ngo-verified">✓ Verified NGO</div>
          </div>
        </div>
      </div>
      <div class="signup-card">
        <div class="signup-spots">${spotsLeft}</div>
        <div class="signup-total">spots left out of ${opp.totalSpots}</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:0%" data-w="${fillPercent}%"></div>
        </div>
        <button class="btn-signup-large ${isSignedUp ? 'signed' : ''}" id="signupBtn" onclick="toggleSignup()">
          ${isSignedUp ? '✓ You\'re Signed Up!' : '🚀 Sign Up Now'}
        </button>
        <div class="xp-badge">⚡ Earn ${opp.xpReward} XP on completion</div>
        <div class="share-buttons">
          <button class="btn-share">📋 Copy Link</button>
          <button class="btn-share">📱 Share</button>
          <button class="btn-share">📅 Calendar</button>
        </div>
      </div>
    </div>
  `;
  
  // Detail cards
  const detailGrid = document.createElement('div');
  detailGrid.className = 'detail-grid';
  detailGrid.innerHTML = `
    <div class="detail-card">
      <div class="detail-icon" style="background:rgba(0,200,150,0.15)">📍</div>
      <div class="detail-content">
        <div class="detail-label">Location</div>
        <div class="detail-value">${opp.location}</div>
        <div class="detail-sub">Google Maps link available after signup</div>
      </div>
    </div>
    <div class="detail-card">
      <div class="detail-icon" style="background:rgba(91,200,255,0.15)">📅</div>
      <div class="detail-content">
        <div class="detail-label">Date & Time</div>
        <div class="detail-value">${opp.date}</div>
        <div class="detail-sub">${opp.time}</div>
      </div>
    </div>
    <div class="detail-card">
      <div class="detail-icon" style="background:rgba(255,179,71,0.15)">👥</div>
      <div class="detail-content">
        <div class="detail-label">Volunteers Joined</div>
        <div class="detail-value">${opp.filledSpots} / ${opp.totalSpots}</div>
        <div class="detail-sub">${spotsLeft} more needed</div>
      </div>
    </div>
    <div class="detail-card">
      <div class="detail-icon" style="background:rgba(167,139,250,0.15)">⚡</div>
      <div class="detail-content">
        <div class="detail-label">XP Reward</div>
        <div class="detail-value">+${opp.xpReward} XP</div>
        <div class="detail-sub">Plus badge progress</div>
      </div>
    </div>
  `;
  
  // Insert after hero
  const hero = document.getElementById('opportunityHero');
  hero.parentNode.insertBefore(detailGrid, hero.nextSibling);
  
  // About section
  document.getElementById('aboutDesc').textContent = opp.longDescription;
  
  // Skills
  document.getElementById('skillsList').innerHTML = opp.skills.map((skill, i) => 
    `<span class="skill-tag ${i < 3 ? 'highlight' : ''}">${skill}</span>`
  ).join('');
  
  // Agenda
  document.getElementById('eventAgenda').innerHTML = opp.agenda.map(item => `
    <div class="agenda-item">
      <div class="agenda-time">${item.time}</div>
      <div>
        <div class="agenda-desc">${item.activity}</div>
        <div class="agenda-sub">${item.desc}</div>
      </div>
    </div>
  `).join('');
  
  // Volunteers
  document.getElementById('volunteersList').innerHTML = opp.volunteers.map((v, i) => `
    <div class="volunteer-card" style="animation-delay:${i * 0.05}s">
      <div class="volunteer-avatar" style="background:${v.bg};color:${v.color}">${v.avatar}</div>
      <div class="volunteer-info">
        <div class="volunteer-name">${v.name}</div>
        <div class="volunteer-role">${v.role}</div>
      </div>
      ${v.badge ? `<div class="volunteer-badge">${v.badge}</div>` : ''}
    </div>
  `).join('');
  
  document.getElementById('volunteerCount').textContent = 
    `Showing ${opp.volunteers.length} of ${opp.filledSpots} registered volunteers`;
  
  // Animate progress bar
  setTimeout(() => {
    document.querySelectorAll('.progress-fill[data-w]').forEach(el => {
      el.style.width = el.getAttribute('data-w');
    });
  }, 200);
}

function toggleSignup() {
  const btn = document.getElementById('signupBtn');
  if (isSignedUp) {
    if (confirm('Are you sure you want to cancel your signup?')) {
      isSignedUp = false;
      btn.textContent = '🚀 Sign Up Now';
      btn.classList.remove('signed');
      currentOpportunity.filledSpots--;
      renderOpportunityDetails(currentOpportunity);
      showToast('Signup cancelled');
    }
  } else {
    isSignedUp = true;
    btn.textContent = '✓ You\'re Signed Up!';
    btn.classList.add('signed');
    currentOpportunity.filledSpots++;
    renderOpportunityDetails(currentOpportunity);
    showToast('🎉 Successfully signed up! +' + currentOpportunity.xpReward + ' XP earned');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Get opportunity ID from URL
const urlParams = new URLSearchParams(window.location.search);
const oppId = urlParams.get('id') || 'river-cleanup';

// Load opportunity
const opp = OPPORTUNITIES_DB[oppId];
if (opp) {
  renderOpportunityDetails(opp);
} else {
  document.getElementById('opportunityHero').innerHTML = `
    <div style="text-align:center;padding:3rem">
      <div style="font-size:4rem;margin-bottom:1rem">🔍</div>
      <h2 style="margin-bottom:1rem">Opportunity Not Found</h2>
      <p style="color:var(--text2);margin-bottom:1.5rem">The opportunity you're looking for doesn't exist or has been removed.</p>
      <a href="explore.html" class="btn-sm btn-primary">← Back to Explore</a>
    </div>`;
}
</script>
