    location:'Kolkata Eco-Park', date:'May 8, 2025', time:'7:00 AM - 12:00 PM', 
    totalSpots:50, filledSpots:35, xpReward:50, 
    agenda:[{time:'7:00 AM',activity:'Registration'},{time:'7:30 AM',activity:'Tree Planting'},{time:'10:00 AM',activity:'Watering'},{time:'11:30 AM',activity:'Closing'}], 
    volunteers:[{name:'Priya M.',role:'Coordinator',avatar:'PM',color:'#0F4C3A',bg:'rgba(15,76,58,0.1)'}] 
  },
  'vaccination-drive': { 
    id:'vaccination-drive', title:'Vaccination Drive Support', ngo:'MediCare Volunteers', ngoEmoji:'🏥', ngoBg:'rgba(59,130,246,0.08)', 
    category:'med', categoryLabel:'Healthcare', 
    longDescription:'Assist healthcare workers during community vaccination drives. Roles include crowd management, registration support, data entry, and post-vaccination observation. Make a direct impact on public health!', 
    skills:['Organization','Communication','Data Entry','Empathy'], 
    location:'Siliguri Community Center', date:'April 30, 2025', time:'8:00 AM - 2:00 PM', 
    totalSpots:20, filledSpots:12, xpReward:65, 
    agenda:[{time:'8:00 AM',activity:'Setup'},{time:'9:00 AM',activity:'Registration'},{time:'11:00 AM',activity:'Vaccination Support'},{time:'1:00 PM',activity:'Data Entry'}], 
    volunteers:[{name:'Dr. Nair',role:'Medical Lead',avatar:'DN',color:'#3B82F6',bg:'rgba(59,130,246,0.1)'}] 
  }
};

let currentOpportunity = null, isSignedUp = false, currentUser = null;
function getCategoryEmoji(cat){ let e={env:'🌿',med:'🏥',edu:'📚',animal:'🐾',tech:'💻',shelter:'🏠'}; return e[cat]||'🤝'; }
function renderOpportunityDetails(opp){
  currentOpportunity=opp; let spotsLeft=opp.totalSpots-opp.filledSpots, fillPercent=(opp.filledSpots/opp.totalSpots)*100;
  document.getElementById('breadcrumb-title').textContent=opp.title;
  document.getElementById('opportunityHero').innerHTML=`<div class="hero-image-container"><img src="${OPP_IMAGES[opp.id]}" class="hero-image" alt="${opp.title}" loading="lazy"></div><div class="hero-content"><div class="opp-header"><div class="opp-title-section"><div class="opp-category">${getCategoryEmoji(opp.category)} ${opp.categoryLabel}</div><h1 class="opp-title">${opp.title}</h1><div class="opp-ngo"><div class="opp-ngo-avatar" style="background:${opp.ngoBg}">${opp.ngoEmoji}</div><div><div class="opp-ngo-name">${opp.ngo}</div><div class="opp-ngo-verified">✓ Verified NGO</div></div></div></div><div class="signup-card"><div class="signup-spots">${spotsLeft}</div><div class="signup-total">spots left out of ${opp.totalSpots}</div><div class="progress-bar"><div class="progress-fill" data-w="${fillPercent}%"></div></div><button class="btn-signup-large ${isSignedUp?'signed':''}" onclick="toggleSignup()">${isSignedUp?'✓ You\'re Signed Up!':'🚀 Sign Up Now'}</button><div class="xp-badge">⚡ Earn ${opp.xpReward} XP on completion</div><div class="share-buttons"><button class="btn-share" onclick="showToast('🔗 Link copied!')">📋 Copy</button><button class="btn-share" onclick="showToast('📱 Shared!')">📱 Share</button></div></div></div></div>`;
  document.getElementById('detailGridContainer').innerHTML=`<div class="detail-grid"><div class="detail-card"><div class="detail-icon">📍</div><div><div class="detail-label">Location</div><div class="detail-value">${opp.location}</div></div></div><div class="detail-card"><div class="detail-icon">📅</div><div><div class="detail-label">Date & Time</div><div class="detail-value">${opp.date}<br><span style="font-size:12px">${opp.time}</span></div></div></div><div class="detail-card"><div class="detail-icon">👥</div><div><div class="detail-label">Volunteers Joined</div><div class="detail-value">${opp.filledSpots} / ${opp.totalSpots}</div><div class="detail-sub">${spotsLeft} more needed</div></div></div><div class="detail-card"><div class="detail-icon">⚡</div><div><div class="detail-label">XP Reward</div><div class="detail-value">+${opp.xpReward} XP</div></div></div></div>`;
  document.getElementById('aboutDesc').textContent=opp.longDescription;
  document.getElementById('skillsList').innerHTML=opp.skills.map((s,i)=>`<span class="skill-tag ${i<3?'highlight':''}">${s}</span>`).join('');
  document.getElementById('eventAgenda').innerHTML=opp.agenda.map(item=>`<div class="agenda-item"><div class="agenda-time">${item.time}</div><div class="agenda-desc">${item.activity}</div></div>`).join('');
  document.getElementById('volunteersList').innerHTML=opp.volunteers.map(v=>`<div class="volunteer-card"><div class="volunteer-avatar" style="background:${v.bg}; color:${v.color}">${v.avatar}</div><div><div class="volunteer-name">${v.name}</div><div class="volunteer-role">${v.role}</div></div></div>`).join('');
  document.getElementById('volunteerCount').textContent=`Showing ${opp.volunteers.length} of ${opp.filledSpots} registered volunteers`;
  setTimeout(()=>{ document.querySelectorAll('.progress-fill[data-w]').forEach(el=>{ el.style.width=el.getAttribute('data-w'); }); },150);
}
function toggleSignup(){ if(isSignedUp){ if(confirm('Cancel your signup?')){ isSignedUp=false; currentOpportunity.filledSpots--; renderOpportunityDetails(currentOpportunity); showToast('❌ Signup cancelled'); } } else { isSignedUp=true; currentOpportunity.filledSpots++; renderOpportunityDetails(currentOpportunity); showToast(`🎉 Signed up! +${currentOpportunity.xpReward} XP earned`); } }
function showToast(m){ let t=document.getElementById('toast'); t.innerHTML=`✅ ${m}`; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800); }
function updateHeaderUI(){ let a=document.getElementById('headerActions'),u=localStorage.getItem('currentUser'); if(u){ currentUser=JSON.parse(u); let n=currentUser.displayName||(currentUser.profile?.name||'Volunteer'),c=n.charAt(0).toUpperCase(),t=currentUser.accountType==='individual'?'Volunteer':'NGO'; a.innerHTML=`<div class="profile-section" id="profileSection"><div class="profile-avatar">${c}</div><div class="profile-info"><div class="profile-name">${n.split(' ')[0]}</div><div class="profile-type">${t}</div></div><i class="fas fa-chevron-down"></i><div class="profile-dropdown"><div class="dropdown-item" onclick="viewProfile()"><i class="fas fa-user-circle"></i> My Profile</div><div class="dropdown-item" onclick="window.location.href='badges.html'"><i class="fas fa-award"></i> My Badges</div><div class="dropdown-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</div></div></div>`; let p=document.getElementById('profileSection'); if(p){ p.addEventListener('click',(e)=>{ e.stopPropagation(); p.classList.toggle('active'); }); document.addEventListener('click',()=>{ p.classList.remove('active'); }); } } else { a.innerHTML=`<a href="notification.html" class="notif">🔔<div class="notif-dot"></div></a><a href="post.html" class="btn-sm">Post Need</a><a href="login.html" class="btn-sm">Log In</a><a href="signup.html" class="btn-sm btn-primary">Join Now</a>`; } }
function viewProfile(){ if(currentUser){ let p=currentUser.profile; alert(`📋 Account Details\n\n${currentUser.accountType==='individual'?`Name: ${p.name}\nEmail: ${p.email}\nXP: ${p.xp||80}`:`Organization: ${p.name}\nEmail: ${p.email}`}`); showToast('Profile loaded'); } }
function viewBadges(){ showToast('✨ Your Badges: Helper Hero, Seed Volunteer'); }
function logout(){ localStorage.removeItem('currentUser'); currentUser=null; updateHeaderUI(); showToast('👋 Logged out'); setTimeout(()=>window.location.reload(),800); }
const urlParams=new URLSearchParams(window.location.search), oppId=urlParams.get('id')||'river-cleanup', oppData=OPPORTUNITIES_DB[oppId];
if(oppData) renderOpportunityDetails(oppData);
else document.getElementById('opportunityHero').innerHTML=`<div style="text-align:center;padding:3rem"><div>🔍 Opportunity Not Found</div><a href="index.html" class="btn-sm btn-primary" style="margin-top:1rem">← Back to Explore</a></div>`;
updateHeaderUI();
window.addEventListener('scroll',()=>{ let h=document.querySelector('header'); if(window.scrollY>20)h.style.background='rgba(255,255,255,0.95)'; else h.style.background='rgba(255,255,255,0.9)'; });
</script>
</body>
</html>
